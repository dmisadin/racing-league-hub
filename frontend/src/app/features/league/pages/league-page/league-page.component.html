
<router-outlet (activate)="onOutletLoaded($event)"> </router-outlet>

    <ng-container *ngFor="let s of leagueItem.seasonsInLeague">
        <a [routerLink]="['season', s.id]">
            <app-season-card [text]="s.name"
                [subtext]="(s.startTime | date:'MMM y') + ' - ' + (s.endTime | date: 'MMM y')" [gameName]="s.game.name">
            </app-season-card>
        </a>
    </ng-container>
</app-section-flex>
