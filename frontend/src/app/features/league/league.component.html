<app-section-flex [direction]="'row'">
    <div class="flex-text-column">
        <h1>F1 Adria Liga</h1>
        <div class="racing-day">
            Racing every Thursday at 20:00 CEST.
        </div>
        <div class="description">
            Basic infromacije o ligi što već organizator želi.
            Utrke se održavaju svakim četvrtkom u 20:00. Liga namjenjena za igrače iz ovog govornog područja.
        </div>
    </div>
    <div class="social-media">
        <app-btn-custom [icon]="'youtube'"></app-btn-custom>
        <app-btn-custom [icon]="'discord'"></app-btn-custom>
        <app-btn-custom [icon]="'instagram'"></app-btn-custom>
        <app-btn-custom [icon]="'facebook'"></app-btn-custom>
        <app-btn-custom [icon]="'twitch'"></app-btn-custom>
        <app-btn-custom [icon]="'globe'"></app-btn-custom>
    </div>
    <img src="../../../assets/images/league/league-logo.png" alt="">
</app-section-flex>
