<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Team</th>
            <th></th>
            <th>Driver</th>
            <th>Best time</th>
            <th>Gap</th>
            <th class="tyreth">Tyre</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let q of qualifying">
            <td>{{ q.position }}</td>
            <td>
                <img src="../../../../assets/images/teams/{{ q.teamId }}.png" alt="" />
            </td>
            <td>
                <div class="flag shadow">
                    <img class="shadow" src="https://hatscripts.github.io/circle-flags/flags/{{q.countryIso | lowercase}}.svg"
                        alt="race" />
                    <!-- <img src="../../../../assets/images/country/{{1}}.svg" alt=""> -->
                </div>
            </td>
            <td class="driver-name">{{q.driverName}}</td>
            <td>
                <ng-container *ngIf="q.resultStatus === 3 || q.fastestLapInMs > 0; else notime">
                    {{q.fastestLapInMs/1000 | raceTime}}
                </ng-container>

                <ng-template #notime>
                    {{ resultStatus[q.resultStatus] }}
                </ng-template>
            </td>
            <td>
                <ng-container *ngIf="q.resultStatus === 3 && q.position !==1 && q.fastestLapInMs">
                    {{ '+' + ((q.fastestLapInMs - qualifying[0].fastestLapInMs ) / 1000 | number:'0.3-3') }}
                </ng-container>
            </td>
            <td class="tyres">
                <img *ngIf="q.bestTimeTyre" src="../../../../assets/images/icons/tyre/{{ q.bestTimeTyre | lowercase }}.svg" alt="" />
            </td>
        </tr>
    </tbody>
</table>
