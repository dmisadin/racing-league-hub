
<div cdkDropList class="result-table" (cdkDropListDropped)="drop($event)" [formGroup]="raceResultFrom">
    <ng-container formArrayName="results">
        <div class="result-row" cdkDragDisabled>
            <div style="width: 20px;"></div>
            <div style="width: 40px;">Position</div>
            <div style="width: 126px;">Driver</div>
            <div style="width: 132px;">Team</div>
            <div style="width: 80px;">Race time</div>
            <div style="width: 88px;">Result status</div>
            <img class="icon" src="../../../../../../assets/images/icons/common/timepenalty.svg" title="Time penalty">
            <img class="icon" src="../../../../../../assets/images/icons/common/judge.svg" title="Post race time penalty">
            <div style="width: 40px;">Grid pos.</div>
            <div style="width: 64px;">Fastest lap</div>
            <div style="width: 40px;">Points</div>
            <div style="width: 40px;">Reserve</div>
            <div style="width: 90px;">Used tyres</div>
            <div style="width: 44px;"></div>
        </div>
        <div [formGroupName]="i"
            class="result-row" 
            *ngFor="let race of results.controls; let i = index" 
            cdkDrag>
            <img src="../../../../../../assets/images/icons/common/six-dots.svg" class="drag-icon">

            <input formControlName="position" type="number" placeholder=1 (mousedown)="$event.stopPropagation()">
    
            <select formControlName="driverId" (mousedown)="$event.stopPropagation()">
                <option *ngFor="let d of drivers" value={{d.id}} >{{d.name}}</option>
            </select>
    
            <select formControlName="teamId" (mousedown)="$event.stopPropagation()">
                <option *ngFor="let t of teams" value={{t.id}} type="number">{{t.name}}</option>
            </select>
    
            <input formControlName="raceTime" type="number" placeholder=1234.567 (mousedown)="$event.stopPropagation()" style="width: 80px;">
            
            <select formControlName="resultStatus" (mousedown)="$event.stopPropagation()">
                <option *ngFor="let status of ResultStatus; let i = index" value={{status.Value}}>{{status.ValueName}}</option>
            </select>

            <input formControlName="timePenalty" type="number" placeholder=3 (mousedown)="$event.stopPropagation()">

            <input formControlName="postRaceTimePenalty" type="number" placeholder=5 (mousedown)="$event.stopPropagation()">

            <input formControlName="gridPosition" type="number" placeholder=5 (mousedown)="$event.stopPropagation()">

            <input formControlName="fastestLapInMs" type="number" placeholder=78901 (change)="updateFastestLap($event)" (mousedown)="$event.stopPropagation()" style="width: 64px;">

            <input formControlName="pointsGained" type="number" placeholder=25 (mousedown)="$event.stopPropagation()">

            <app-switch [controlName]="'isReserve'" [onOff]="false" (mousedown)="$event.stopPropagation()"></app-switch>

            <input formControlName="usedTyres" type="text" placeholder=smhiw (mousedown)="$event.stopPropagation()" style="width: 90px;">

            <app-btn-custom [faIcon]="faTrashCan" [size]="'32px'" (OnClick)="removeResultRowClick(i)"></app-btn-custom>
        </div>
        <div class="result-row" cdkDragDisabled>
            <app-btn-custom [label]="'Add result'" 
                (OnClick)="addResultRowClick()"
                [isDisabled]="results.controls.length >= maxAmount">
            </app-btn-custom>   

            <app-btn-custom [label]="'Submit'" 
                (OnClick)="submitResults()"
                [isDisabled]="results.controls.length >= maxAmount">
            </app-btn-custom>   

            <span *ngIf="results.controls.length >= maxAmount">
                {{'Maximum is ' + maxAmount + ' drivers'}} 
            </span>
        </div>
    </ng-container>
</div>
