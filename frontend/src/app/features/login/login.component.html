<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <h1>Login</h1>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="Email" formControlName="email">
    <div class="label-flex">
        <label for="password">Password</label>
        <a href="/">Forgot password?</a>
    </div>
    <input type="password" name="password" id="password" placeholder="Password" formControlName="password">

    <label class="checkbox">
        <input aria-hidden="true" class="checkbox__input" type="checkbox" name="rememberUser" formControlName="rememberUser">
        <div class="checkbox__box">
            <svg class="checkbox__check" fill="none" width="10" height="10" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 4.9375L3.43478 8L9 1" stroke-width="2"/>
            </svg>
        </div>
        Remember me
    </label>
    <button>Log in</button>
    <div id="create-acc">Don't have an account? <a href="/register">Create new account</a></div>
</form>
