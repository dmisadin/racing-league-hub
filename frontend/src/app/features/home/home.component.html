<app-alert></app-alert>

<app-announcement-carousel></app-announcement-carousel>

<app-section-flex [direction]="'row'" [title]="''" [justify]="'space-between'">

    <a routerLink="/leagues/add">
        <app-btn-large [label]="'Create your own league'" [iconName]="faPlus">
        </app-btn-large>
    </a>
    <a routerLink="/leagues">
        <app-btn-large [label]="'Find your place to race'" [iconName]="faSearch"></app-btn-large>
    </a>
    <app-btn-large [label]="'Check out the leaderboards'" [iconName]="faStopwatch"></app-btn-large>
</app-section-flex>

<div *ngIf="isDataLoaded">
    <app-section-flex [direction]="'column'" [title]="'Recent results'">
        <app-race-row 
            *ngFor="let item of grandPrixData" 
            [first]="item.name" 
            [second]="item.season.name" 
            [third]="item.league.name"
            [routerLink]="['leagues', item.league.id, 'season', item.season.id ,'grandprix', item.id]"
            >
        </app-race-row>
    </app-section-flex>
</div>
<div>
    <app-section-flex [direction]="'column'" [title]="'Active seasons'">
        <app-race-row 
            *ngFor="let item of popularLeagues;" 
            [first]="item.name"
            [routerLink]="['leagues', item.id]"
            >
            <img src="../../../assets/images/game/black/F12021.svg" alt="F1 2021" class="racerow-icon">
            <img src="../../../assets/images/icons/platform/steam.svg" alt="Steam" class="racerow-icon">
        </app-race-row>
    </app-section-flex>
</div>
