<app-alert></app-alert>

<app-announcement-carousel></app-announcement-carousel>

<app-section-flex [direction]="'row'" [title]="''" [justify]="'space-between'">
  <app-btn-large
    [label]="'Create your own league'"
    [iconName]="faPlus"
  ></app-btn-large>
  <app-btn-large
    [label]="'Find your place to race'"
    [iconName]="faSearch"
  ></app-btn-large>
  <app-btn-large
    [label]="'Check out the leaderboards'"
    [iconName]="faStopwatch"
  ></app-btn-large>
</app-section-flex>

<div *ngIf="isDataLoaded">
  <app-section-flex [direction]="'column'" [title]="'Recent results'">
    <app-race-row
      *ngFor="let item of grandPrixData"
      [grandPrixName]="item.grandPrixName"
      [leagueName]="item.leagueName"
      [seasonName]="item.seasonName"
    >
    </app-race-row>
  </app-section-flex>
</div>
<div>
  <app-section-flex [direction]="'column'" [title]="'Popular leagues'">
    <app-race-row
      *ngFor="let item of popularLeagues; index as i"
      [grandPrixName]="item.grandPrixName"
      [leagueName]="item.leagueName"
      [seasonName]="item.seasonName"
    ></app-race-row>
  </app-section-flex>
</div>
