<app-alert></app-alert>

<app-announcement-carousel></app-announcement-carousel>

<app-section-flex [direction]="'row'" [title]="''" [justify]="'space-between'">
  <app-btn-large [label]="'Create your own league'" [iconName]="faPlus"></app-btn-large>
  <app-btn-large [label]="'Find your place to race'" [iconName]="faSearch"></app-btn-large>
  <app-btn-large [label]="'Check out the leaderboards'" [iconName]="faStopwatch"></app-btn-large>
</app-section-flex>

<!-- Ove vrijednosti zamjeniti podacima iz baze podataka ili kreirati placeholder objekte! -->
<!-- U buducnosti koristiti NgFor directive za prikaz objekata sadrzanih u arrayu dobivenom od strane baze -->
<app-section-flex [direction]="'column'" [title]="'Recent results'">
  <app-race-row [first]="'VN Bahreina'" [second]="'F1 Adria Liga - Sezona 6'" [faIcon]="faPlayCircle"
    (click)="openRace()"></app-race-row>
  <app-race-row [first]="'VN Australije'" [second]="'OKTAN F1 Liga - Sezona 3'" [faIcon]="faPlayCircle"></app-race-row>
  <app-race-row [first]="'Formula 1 Emilia Romagna Grand Prix'" [second]="'Formula 1 - 2023'"
    [faIcon]="faPlayCircle"></app-race-row>
</app-section-flex>

<app-section-flex [direction]="'column'" [title]="'Popular leagues'">
  <app-race-row [first]="'F1 Adria Liga - Sezona 6'" [faIcon]="faCalendarDays">
    <div class="content">
      <img src="../../../assets/images/game/black/F122.svg" alt="">
    </div>
  </app-race-row>
  <app-race-row [first]="'F1 Adria Liga - Sezona 4'" [faIcon]="faCalendarDays">
    <div class="content">
      <img src="../../../assets/images/game/black/F12021.svg" alt="">
    </div>
  </app-race-row>
  <app-race-row [first]="'F1 Adria Liga - Sezona 1'" [faIcon]="faCalendarDays">
    <div class="content">
      <img src="../../../assets/images/game/black/F12019.svg" alt="">
    </div>
  </app-race-row>
</app-section-flex>
