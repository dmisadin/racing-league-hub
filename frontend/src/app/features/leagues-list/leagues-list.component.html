<app-section-flex [direction]="'row'" class="wrapping" [title]="'List of leagues'" [gap]="'16px'">
    <ng-container *ngFor="let l of leagueList">
        <a [routerLink]="[l.id]" >
            <app-season-card
                [text]="l.name"
                [subtext]="l.description"
                >
            </app-season-card>
        </a>
    </ng-container>
</app-section-flex>
