<div [formGroup]="pointsItem" class="row-input">
    <input type="number" placeholder="1" formControlName="position">
    <input type="number" placeholder="25" formControlName="points">
    <app-btn-custom [faIcon]="faTrashCan" (OnClick)="removePointsItem(arrayIndex)"></app-btn-custom>
</div>
<span *ngIf="!pointsItem.valid && pointsItem?.dirty" class="error-text">
    These are required fields.
</span>
