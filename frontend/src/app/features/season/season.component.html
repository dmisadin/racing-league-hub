<app-section-flex [direction]="'row'">
    <div class="flex-text-column">
        <h1>F1 Adria Liga - Sezona 6</h1>
        <div class="racing-day">
            Racing on Thursdays at 20:00 CEST
        </div><!-- 
        <div class="description">
            Basic infromacije o ligi što već organizator želi.
            Utrke se održavaju svakim četvrtkom u 20:00. Liga namjenjena za igrače iz ovog govornog područja.
        </div> -->
        <app-section-flex [direction]="'row'" class="wrapping" [titleM]="'Allowed assists'">
            <app-icon-label 
                *ngFor="let a of assists"
                [iconPath]="'assists/' + a.icon + '.png'" 
                [name]="a.name">
                {{a.value}}
            </app-icon-label>
        </app-section-flex>
        <app-section-flex [direction]="'row'" class="wrapping" [titleM]="'Lobby settings'">
            <app-icon-label 
                *ngFor="let l of lobbySettings" 
                [iconPath]="'lobby/' + l.icon + '.png'" 
                [name]="l.name"
                [width]="'240px'"
                >{{l.value}}</app-icon-label>
        </app-section-flex>
    </div>
    <img src="../../../assets/images/league/league-logo.png" alt="">
</app-section-flex>


<app-section-flex [direction]="'row'" [title]="'Drivers championship standings'" >
    <app-table-driver-standings 
        [grandPrixes]="seasonItem.grandPrixes"
        [drivers]="seasonItem.drivers">
        
    </app-table-driver-standings>
</app-section-flex>


<app-section-flex [direction]="'row'" [title]="'Constructors championship standings'" >
    <app-table-team-standings>
        
    </app-table-team-standings>
</app-section-flex>


<app-section-flex [direction]="'column'" [title]="'Points distribution'" >
    <app-section-flex [titleM]="'Qualifying points'" *ngIf="seasonItem.qualPoints?.length">
        <table>
            <thead>
                <th>Position</th>
                <th *ngFor="let qp of seasonItem.racePoints">P{{qp.position}}</th>
            </thead>
            <tbody>
                <tr>
                    <td>Points</td>
                    <td *ngFor="let qp of seasonItem.racePoints">{{qp.points}}</td>
                </tr>
            </tbody>
        </table>
    </app-section-flex>

    <app-section-flex [titleM]="'Sprint points'" *ngIf="seasonItem.sprintPoints?.length">
        <table>
            <thead>
                <th>Position</th>
                <th *ngFor="let sp of seasonItem.racePoints">P{{sp.position}}</th>
            </thead>
            <tbody>
                <tr>
                    <td>Points</td>
                    <td *ngFor="let sp of seasonItem.racePoints">{{sp.points}}</td>
                </tr>
            </tbody>
        </table>
    </app-section-flex>

    <app-section-flex [titleM]="'Race points'" *ngIf="seasonItem.racePoints?.length">
        <table>
            <thead>
                <th>Position</th>
                <th *ngFor="let rp of seasonItem.racePoints">P{{rp.position}}</th>
            </thead>
            <tbody>
                <tr>
                    <td>Points</td>
                    <td *ngFor="let rp of seasonItem.racePoints">{{rp.points}}</td>
                </tr>
            </tbody>
        </table>
    </app-section-flex>
</app-section-flex>


<app-section-flex [direction]="'row'" class="wrapping" [title]="'Race calendar'" [justify]="'space-between'" [gap]="'16px'">
    <a *ngFor="let gp of seasonItem.grandPrixes" [routerLink]="['grandprix', gp.id]">
        <app-race-card
        [gpName]="gp.name"
        ></app-race-card>
    </a>
</app-section-flex>
