<app-section-flex [direction]="'row'">
    <div class="flex-text-column">
        <h1>F1 Adria Liga - Sezona 6</h1>
        <div class="racing-day">
            Racing on Thursdays at 20:00 CEST
        </div><!-- 
        <div class="description">
            Basic infromacije o ligi što već organizator želi.
            Utrke se održavaju svakim četvrtkom u 20:00. Liga namjenjena za igrače iz ovog govornog područja.
        </div> -->
        <app-section-flex [direction]="'row'" class="wrapping" [titleM]="'Allowed assists'" [justify]="'flex-start'">
            <app-icon-label [iconPath]="'assists/tractioncontrol.png'" [name]="'Traction Control'">Medium</app-icon-label>
            <app-icon-label [iconPath]="'assists/abs.png'" [name]="'ABS'">Off</app-icon-label>
            <app-icon-label [iconPath]="'assists/racingline.png'" [name]="'Racing Line'">Corners only</app-icon-label>
            <app-icon-label [iconPath]="'assists/gearbox.png'" [name]="'Gearbox'">Manual</app-icon-label>
        </app-section-flex>
        <app-section-flex [direction]="'row'" class="wrapping" [titleM]="'Lobby settings'" [justify]="'flex-start'">
            <app-icon-label *ngFor="let l of mockLobby" [iconPath]="l.iconPath" [name]="l.name" [width]="'165px'">{{l.value}}</app-icon-label>
        </app-section-flex>
    </div>
    <img src="../../../assets/images/league/league-logo.png" alt="">
</app-section-flex>


<app-section-flex [direction]="'row'" [title]="'Drivers championship standings'" >
    <app-table-driver-standings>
        
    </app-table-driver-standings>
</app-section-flex>


<app-section-flex [direction]="'row'" [title]="'Constructors championship standings'" >
    <app-table-team-standings>
        
    </app-table-team-standings>
</app-section-flex>


<app-section-flex [direction]="'column'" [title]="'Points distribution'" >
    <table>
        <thead>
            <th>Position</th>
            <th *ngFor="let p of mockPoints; let i = index">P{{i+1}}</th>
        </thead>
        <tbody>
            <tr>
                <td>Points</td>
                <td *ngFor="let p of mockPoints;">{{p}}</td>
            </tr>
        </tbody>
    </table>
</app-section-flex>


<app-section-flex [direction]="'row'" class="wrapping" [title]="'Race calendar'" >
    <app-race-card></app-race-card>
    <app-race-card></app-race-card>
    <app-race-card></app-race-card>
    <app-race-card></app-race-card>
    <app-race-card></app-race-card>
    <app-race-card></app-race-card>
</app-section-flex>
