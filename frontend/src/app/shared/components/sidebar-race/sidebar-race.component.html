<div class="race-info">
  <div class="leagueName">{{ leagueName }}</div>
  <div class="grandPrixName">{{ grandPrixName }}</div>
</div>
<div class="time-remaining">
  {{ timeRemaining <= 0 ? "LIVE" : (startTime | dateDiffFromNow) }}
</div>
<app-btn-custom
  [label]="''"
  [colorClass]="timeRemaining <= 0 ? 'red' : 'light'"
  [faIcon]="timeRemaining <= 0 ? faCircle : faPlay"
  (click)="goToExternal(streamUrl, $event)"
>
</app-btn-custom>
