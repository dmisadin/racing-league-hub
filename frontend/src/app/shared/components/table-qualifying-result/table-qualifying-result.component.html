<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Team</th>
            <th></th>
            <th>Driver</th>
            <th>Best time</th>
            <th>Gap</th>
            <th class="tyreth">Tyre</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let driver of mockDrivers">
            <td>{{driver.position}}</td>
            <td> <img src="../../../../assets/images/teams/{{driver.teamid}}.png" alt=""> </td>
            <td>
                <div class="flag shadow">
                    <img class="shadow" src="https://hatscripts.github.io/circle-flags/flags/si.svg" alt="race">
                    <!-- <img src="../../../../assets/images/country/{{1}}.svg" alt=""> -->
                </div>
            </td>
            <td class="driver-name">Primož Miklavčič</td>
            <td>1:23.456</td>
            <td>+0.957</td>
            <td class="tyres">
                <img src="../../../../assets/images/icons/tyre/{{tyre}}.svg" alt="">
            </td>
        </tr>
    </tbody>
</table>
