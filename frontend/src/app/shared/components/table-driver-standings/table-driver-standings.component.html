<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Team</th>
            <th>Country</th>
            <th>Driver</th>
            <th *ngFor="let c of mockCountries">
                <div class="flag shadow">
                    <!-- <img src="../../../../assets/images/country/{{r}}.svg" alt="race"> -->
                    <img src="https://hatscripts.github.io/circle-flags/flags/{{c}}.svg" alt="race">
                </div>

            </th>

            <th>Points</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let driver of mockDrivers">
            <td>{{driver.position}}</td>
            <td> <img src="../../../../assets/images/teams/{{driver.teamid}}.png" alt=""> </td>
            <td>
                <div class="flag shadow">
                    <img class="shadow" src="https://hatscripts.github.io/circle-flags/flags/hr.svg" alt="race" width="32px">
                    <!-- <img src="../../../../assets/images/country/{{1}}.svg" alt=""> -->
                </div>
            </td>
            <td class="driver-name">Dimitrije Minić</td>
            <th *ngFor="let c of mockCountries" class="points"> - </th>
            <td>100</td>
        </tr>
    </tbody>
</table>
