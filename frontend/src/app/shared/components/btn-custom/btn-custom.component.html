<button
    class="btn"
    type="button"
    [ngClass]="colorClass"
    [ngStyle]="{'padding': label ? '' : '8px', 
                'width': size, 'height': size }"
    (click)="emitEvent()"
    [disabled]="isDisabled">
    <fa-icon *ngIf="faIcon" [icon]="faIcon"></fa-icon>
    {{label}}
</button>
