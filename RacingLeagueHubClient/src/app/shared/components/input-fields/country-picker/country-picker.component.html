<ng-select
    [items]="filteredCountries()"
    bindLabel="name"
    bindValue="alpha2"
    [searchable]="true"
    placeholder="Select country"
    [ngModel]="selectedCountry()?.alpha2"
    (change)="select($event)"
    (search)="search($event.term)"
    (clear)="clear()">
</ng-select>

@if (control?.touched && control?.invalid) 
{
<div class="text-error mt-1">
    @if (control?.errors?.['required']) {
    <small class="block">This field is required</small>
    }
</div>
}
