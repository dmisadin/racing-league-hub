<div class="flex justify-center">
    <div class="card flex-grow bg-base-100 shadow-xl mt-20 mb-20 p-6">
        <h2 class="card-title mb-4">Enter your 2FA code</h2>
        <div class="flex flex-col gap-4">
            <input-text label="Code" placeholder="Enter your code" [formControl]="code"></input-text>
<!-- 
            <label class="label">
                <input type="checkbox" class="checkbox" formControlName="rememberMe"/>
                Remember me
            </label> -->

            <div class="text-center">
                <button type="submit" class="btn btn-primary w-full mb-2" [disabled]="code.invalid || isLoading()" (click)="submitCode()">
                    Log in
                    @if (isLoading()) {
                    <span class="loading loading-spinner loading-sm"></span>
                    }
                </button>
            </div>
        </div>
    </div>
</div>
