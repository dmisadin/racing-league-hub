<div class="space-y-8">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <input-text label="Name" formControlName="name" placeholder="Season 10"></input-text>

        <label class="block text-sm font-medium mb-1">
            <p class="mb-1">Platform</p>
            <ng-select [items]="platformOptions" 
                bindLabel="name"
                bindValue="id"
                formControlName="platform">
            </ng-select>
        </label>

        <label class="block text-sm font-medium mb-1">
            <p class="mb-1">Game</p>
            <ng-select [items]="gameOptions" 
                bindLabel="name"
                bindValue="id"
                formControlName="game">
            </ng-select>
        </label>
        
        <input-number label="Lap percentage required" 
            formControlName="lapPercentageRequired"
            [min]="1"
            [max]="100"
            suffix="%">
        </input-number>

        <input-text label="URL slug" 
            formControlName="slug" 
            [placeholder]="(form.controls['name']?.value || 'Season 10') | slug" 
            customValidatorName="slug">
        </input-text>
        
        <input-file label="Season logo" formControlName="logoResourceId" class="md:col-span-2"></input-file>

        <div class="md:col-span-2 flex justify-end gap-2">
            <button type="button" (click)="onCancel()" class="btn btn-soft btn-error">
                Cancel
            </button>

            <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
                Save All Changes
            </button>
        </div>
    </form>
</div>
